services:
  app:
    build:
      context: .
      dockerfile: ./docker/frankenphp/Dockerfile
      target: php_dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
      - target: 9003
        published: ${XDEBUG_PORT:-9003}
        protocol: tcp
    volumes:
      - ./:/app:cached
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Caddy / FrankenPHP process-level settings only. Application config
      # (DATABASE_URL, APP_SECRET, …) is NOT duplicated here — Symfony reads it
      # from the mounted .env via symfony/dotenv. Single source of truth.
      SERVER_NAME: "${SERVER_NAME:-localhost}"
      FRANKENPHP_CONFIG: "worker ./public/index.php"
      CADDY_GLOBAL_OPTIONS: |
        metrics
      # Consumed by the Caddy mercure block (process env, not dotenv-readable).
      MERCURE_JWT_SECRET: "${MERCURE_JWT_SECRET:-!ChangeMe!}"
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      XDEBUG_CLIENT_HOST: "host.docker.internal"
      XDEBUG_START_WITH_REQUEST: "yes"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      # /ready = dependencies reachable (ADR-0005). Caddy serves the named
      # SERVER_NAME site with an HTTP→HTTPS redirect, so probe HTTPS directly;
      # --resolve pins the hostname to the loopback.
      test: ["CMD-SHELL", "curl -fsS -k --resolve ${SERVER_NAME:-localhost}:443:127.0.0.1 https://${SERVER_NAME:-localhost}/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    tty: true
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Loopback-only and var-driven: parallel stacks offset DB_PORT instead of
      # colliding on a globally published 5432.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:
  db_data:
  redis_data:

networks:
  app-network:
    driver: bridge
