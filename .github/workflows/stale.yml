name: "Close Stale Issues"

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Template issues age slowly ("broken on Apple Silicon" stays true
          # for months) — be patient, and never auto-close PRs.
          stale-issue-message: |
            This issue has been inactive for 90 days and will be closed in 30 days
            without new activity. Comment or add details to keep it open.
          days-before-stale: 90
          days-before-close: 30
          days-before-pr-stale: -1
          days-before-pr-close: -1
          exempt-issue-labels: 'pinned,bug,good-first-issue,help-wanted'
          stale-issue-label: 'stale'
          close-issue-message: 'Closed due to inactivity. Reopen anytime with new details.'
          remove-stale-when-updated: true
          operations-per-run: 100
