; This file replaces the one generated by install-php-extensions, so it must
; load the extension itself — without this line Xdebug is silently absent.
zend_extension=xdebug

; The XDEBUG_MODE env var (compose) overrides this at runtime.
xdebug.mode=off
xdebug.start_with_request=yes
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.log=/tmp/xdebug.log
xdebug.max_nesting_level=512
xdebug.output_dir=/tmp
