global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Caddy/FrankenPHP metrics from the admin endpoint (compose network only).
  - job_name: 'frankenphp'
    static_configs:
      - targets: ['app:2019']
    metrics_path: '/metrics'
    scrape_interval: 5s
