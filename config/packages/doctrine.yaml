doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        charset: 'utf8'
        server_version: '17'
        types:
            task_title: App\Context\Task\Shared\TaskTitleType
    orm:
        enable_native_lazy_objects: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src'
                prefix: 'App'
                alias: App
            # Per-context mapping example (uncomment when a context ships Doctrine entities):
            # User:
            #     type: attribute
            #     is_bundle: false
            #     dir: '%kernel.project_dir%/src/Context/User/Entity'
            #     prefix: 'App\Context\User\Entity'
            #     alias: User

when@test:
    doctrine:
        dbal:
            # Same PostgreSQL server, dedicated database: "app" → "app_test".
            # No sqlite split — tests run against the engine that ships to prod.
            dbname_suffix: '_test'
