# The skeleton ships no authentication on purpose: session vs JWT vs OAuth is
# a product decision. Everything is public; add a user provider, an
# authenticator and access_control rules when your project grows auth
# (JWT setup proven in production: docs/recipes/jwt-auth.md).
security:
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
